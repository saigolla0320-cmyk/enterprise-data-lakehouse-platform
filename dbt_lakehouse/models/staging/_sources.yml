version: 2

sources:
  - name: silver
    description: "Silver layer Delta tables produced by Databricks transformations"
    schema: silver
    tables:
      - name: fct_transactions
        description: "Cleaned, deduplicated customer transactions"
        loaded_at_field: _processed_at
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        columns:
          - name: transaction_id
            description: "Unique transaction identifier"
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: amount_usd
            tests:
              - not_null

      - name: dim_customer
        description: "SCD Type 2 customer dimension"
        columns:
          - name: customer_id
            tests:
              - not_null
          - name: is_current
            tests:
              - not_null
